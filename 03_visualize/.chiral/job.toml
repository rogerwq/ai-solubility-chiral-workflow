name = "Visualize Report"
description = "Generates an interactive HTML report from solubility predictions. Includes a colour-coded heatmap of all molecules × solvents and individual bar charts ranked by logS for each molecule."
inputs = ["solubility_predictions.csv"]
outputs = ["solubility_report.html"]

[container]
image = "solubility_pipeline:2026_06_05"

[scripts]
run = "run.sh"

[params.top_n_solvents]
type = "integer"
default = 20
hint = "Number of top solvents (by mean logS across all molecules) to show in the heatmap overview."
